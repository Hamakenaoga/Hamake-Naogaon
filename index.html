<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রেজিস্ট্রেশন - আমাকে নওগাঁ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #ffffff; }
        .input-field { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; margin-bottom: 15px; }
        .input-field:focus { border-color: #00897B; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-sm mx-auto">
        <h2 class="text-xl font-bold text-gray-800 mb-6">রক্তদাতা রেজিস্ট্রেশন</h2>
        
        <form id="registration-form">
            <input type="text" name="Name" placeholder="আপনার নাম" required class="input-field">
            
            <input type="tel" name="Phone" placeholder="ফোন নম্বর" required class="input-field">
            
            <select name="BloodGroup" required class="input-field">
                <option value="">রক্তের গ্রুপ নির্বাচন করুন</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
            </select>
            
            <input type="text" name="Location" placeholder="লোকেশন (থানা/গ্রাম)" required class="input-field">
            
            <label class="text-xs text-gray-500 block mb-1 ml-1">শেষ রক্তদানের তারিখ</label>
            <input type="date" name="LastDonation" class="input-field">

            <button type="submit" id="submit-btn" class="w-full bg-[#00897B] text-white py-3 rounded-lg font-bold mt-4 shadow-sm">
                তথ্য জমা দিন
            </button>
        </form>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxWYdUtwkkuJ8Sqytx7An-Rws0L4sSsAtHcEMIEOTYRsbHFQbhd2scJ-JVW5v3pMwQdQw/exec';
        const form = document.getElementById('registration-form');
        const btn = document.getElementById('submit-btn');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerHTML = "প্রসেসিং...";

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert("সফলভাবে জমা হয়েছে!");
                form.reset();
                btn.disabled = false;
                btn.innerHTML = "তথ্য জমা দিন";
            })
            .catch(error => {
                alert("আবার চেষ্টা করুন");
                btn.disabled = false;
                btn.innerHTML = "তথ্য জমা দিন";
            });
        });
    </script>
</body>
</html>

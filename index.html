<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রেজিস্ট্রেশন - আমাকে নওগাঁ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #ffffff; margin: 0; padding: 0; }
        .cover-photo { width: 100%; height: 200px; object-fit: cover; border-bottom: 4px solid #00897B; }
        .form-container { padding: 20px; max-width: 400px; margin: auto; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 14px; color: #555; margin-bottom: 5px; font-weight: 600; }
        .input-field { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; outline: none; font-size: 15px; }
        .input-field:focus { border-color: #00897B; }
        .submit-btn { width: 100%; bg-[#00897B]; background-color: #00897B; color: white; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .submit-btn:hover { background-color: #00695C; }
    </style>
</head>
<body>

    <img src="https://via.placeholder.com/600x300?text=AmaKe+Naogaon+Cover" alt="Cover Photo" class="cover-photo">

    <div class="form-container">
        <h2 class="text-xl font-bold text-gray-800 mb-4 text-center">রক্তদাতা রেজিস্ট্রেশন</h2>
        
        <form id="registration-form">
            <div class="input-group">
                <label>আপনার নাম</label>
                <input type="text" name="Name" placeholder="নাম লিখুন" required class="input-field">
            </div>
            
            <div class="input-group">
                <label>মোবাইল নম্বর</label>
                <input type="tel" name="Phone" placeholder="০১XXXXXXXXX" required class="input-field">
            </div>
            
            <div class="input-group">
                <label>রক্তের গ্রুপ</label>
                <select name="BloodGroup" required class="input-field">
                    <option value="">নির্বাচন করুন</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>উপজেলা</label>
                <input type="text" name="Location" placeholder="যেমন: সাপাহার" required class="input-field">
            </div>
            
            <div class="input-group">
                <label>শেষ রক্তদানের তারিখ</label>
                <input type="date" name="LastDonation" class="input-field">
            </div>

            <button type="submit" id="submit-btn" class="submit-btn">রেজিস্ট্রেশন সম্পন্ন করুন</button>
        </form>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxWYdUtwkkuJ8Sqytx7An-Rws0L4sSsAtHcEMIEOTYRsbHFQbhd2scJ-JVW5v3pMwQdQw/exec';
        const form = document.getElementById('registration-form');
        const btn = document.getElementById('submit-btn');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerHTML = "অপেক্ষা করুন...";

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert("ধন্যবাদ! রেজিস্ট্রেশন সফল হয়েছে।");
                form.reset();
                btn.disabled = false;
                btn.innerHTML = "রেজিস্ট্রেশন সম্পন্ন করুন";
            })
            .catch(error => {
                alert("দুঃখিত, আবার চেষ্টা করুন।");
                btn.disabled = false;
                btn.innerHTML = "রেজিস্ট্রেশন সম্পন্ন করুন";
            });
        });
    </script>
</body>
</html>

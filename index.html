<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রক্তদাতা রেজিস্ট্রেশন - আমাকে নওগাঁ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f0fdf4; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border-t-4 border-[#00897B]">
        <h2 class="text-2xl font-bold text-[#00897B] mb-6 text-center">রক্তদাতা রেজিস্ট্রেশন</h2>
        
        <form id="registration-form" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700">আপনার নাম</label>
                <input type="text" name="Name" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-[#00897B]" placeholder="যেমন: আব্দুর রহমান">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">ফোন নম্বর</label>
                <input type="tel" name="Phone" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-[#00897B]" placeholder="০১XXXXXXXXX">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">রক্তের গ্রুপ</label>
                <select name="BloodGroup" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-[#00897B]">
                    <option value="">নির্বাচন করুন</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">লোকেশন (উপজেলা/গ্রাম)</label>
                <input type="text" name="Location" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-[#00897B]" placeholder="যেমন: সাপাহার, নওগাঁ">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">শেষ রক্তদানের তারিখ</label>
                <input type="date" name="LastDonation" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-[#00897B]">
            </div>

            <input type="hidden" name="Latitude" value="">
            <input type="hidden" name="Longitude" value="">

            <button type="submit" id="submit-btn" class="w-full bg-[#00897B] text-white font-bold py-3 rounded-lg hover:bg-[#00695C] transition-all">
                তথ্য জমা দিন
            </button>
        </form>
    </div>

    <script>
        // আপনার নতুন স্ক্রিপ্ট ইউআরএল
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxWYdUtwkkuJ8Sqytx7An-Rws0L4sSsAtHcEMIEOTYRsbHFQbhd2scJ-JVW5v3pMwQdQw/exec';
        const form = document.getElementById('registration-form');
        const btn = document.getElementById('submit-btn');

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            // বাটন ডিসেবল করা
            btn.disabled = true;
            btn.innerHTML = "প্রসেসিং...";
            btn.classList.add('opacity-50');

            fetch(scriptURL, { 
                method: 'POST', 
                body: new FormData(form)
            })
            .then(response => {
                alert("সফলভাবে আপনার তথ্য গুগল শিটে জমা হয়েছে!");
                form.reset();
                btn.disabled = false;
                btn.innerHTML = "তথ্য জমা দিন";
                btn.classList.remove('opacity-50');
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert("দুঃখিত! ডাটা জমা হয়নি। ইন্টারনাল এরর।");
                btn.disabled = false;
                btn.innerHTML = "তথ্য জমা দিন";
                btn.classList.remove('opacity-50');
            });
        });
    </script>
</body>
</html>
